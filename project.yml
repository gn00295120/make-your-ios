name: MakeYourIOS
options:
  bundleIdPrefix: com.longweiwang
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    DEVELOPMENT_TEAM: QJX3775S8M
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: true
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: true
targets:
  MakeYourIOS:
    type: application
    platform: iOS
    sources:
      - path: MakeYourIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.longweiwang.makeyourios
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: MakeYour
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_NSUserNotificationsUsageDescription: MakeYour uses notifications only when a mini app asks you to schedule a reminder.
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: false
    scheme:
      testTargets:
        - MakeYourIOSTests
  MakeYourIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MakeYourIOSTests
    dependencies:
      - target: MakeYourIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.longweiwang.makeyourios.tests
        GENERATE_INFOPLIST_FILE: true
