name: MakeYourIOS
options:
  bundleIdPrefix: com.longweiwang
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: 4
    MARKETING_VERSION: 1.0.0
    DEVELOPMENT_TEAM: QJX3775S8M
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: true
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: true
targets:
  MakeYourIOS:
    type: application
    platform: iOS
    sources:
      - path: MakeYourIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.longweiwang.makeyourios
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: MakeYour
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_NSCameraUsageDescription: MakeYour uses the camera only when a tiny app asks you to take a photo or scan a code.
        INFOPLIST_KEY_NSContactsUsageDescription: MakeYour shows Apple’s contact picker only when a tiny app asks you to choose a contact.
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: MakeYour requests one current location only when you tap a tiny app location component.
        INFOPLIST_KEY_NSMotionUsageDescription: MakeYour reads today’s step count only when you tap a tiny app pedometer component.
        INFOPLIST_KEY_NSCalendarsWriteOnlyAccessUsageDescription: MakeYour adds a calendar event only after you review it and tap Add Event.
        INFOPLIST_KEY_NSMicrophoneUsageDescription: MakeYour records a local voice note only after you tap Record inside a tiny app.
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: MakeYour transcribes a linked local voice note only after you tap, using on-device recognition when available.
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: false
    scheme:
      testTargets:
        - MakeYourIOSTests
  MakeYourIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MakeYourIOSTests
    dependencies:
      - target: MakeYourIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.longweiwang.makeyourios.tests
        GENERATE_INFOPLIST_FILE: true
  MakeYourIOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MakeYourIOSUITests
    dependencies:
      - target: MakeYourIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.longweiwang.makeyourios.uitests
        GENERATE_INFOPLIST_FILE: true
schemes:
  MakeYourIOSLiveE2E:
    build:
      targets:
        MakeYourIOS: all
        MakeYourIOSUITests: [test]
    test:
      commandLineArguments:
        "-run-live-ai-e2e": true
      captureScreenshotsAutomatically: true
      deleteScreenshotsWhenEachTestSucceeds: false
      targets:
        - name: MakeYourIOSUITests
          parallelizable: false
